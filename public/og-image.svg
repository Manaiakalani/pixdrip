<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(45 0.5 0.5)">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative droplets -->
  <g opacity="0.18" fill="#ffffff">
    <path d="M120 110c0 0-40 53-40 93a40 40 0 0 0 80 0c0-40-40-93-40-93z"/>
    <path d="M1060 470c0 0-26 35-26 61a26 26 0 0 0 52 0c0-26-26-61-26-61z"/>
    <path d="M980 90c0 0-18 24-18 42a18 18 0 0 0 36 0c0-18-18-42-18-42z"/>
  </g>

  <!-- Soft glow behind wordmark -->
  <ellipse cx="600" cy="335" rx="420" ry="120" fill="#ffffff" opacity="0.10" filter="url(#soft)"/>

  <!-- Droplet logo mark, scaled to 96px from the 32px source path -->
  <g transform="translate(384 220) scale(3)" fill="#ececf1">
    <path d="M16 2c0 0-6 8-6 14a6 6 0 0 0 12 0c0-6-6-14-6-14z"/>
  </g>

  <!-- Wordmark -->
  <text x="496" y="370"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="168"
        fill="#ececf1"
        letter-spacing="-6">pixdrip</text>

  <!-- Subtitle -->
  <text x="600" y="470"
        text-anchor="middle"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="36"
        fill="#ffffff"
        opacity="0.92">Blog image beautifier — borders, shadows, frames</text>

  <!-- Tag pill -->
  <g transform="translate(495 520)">
    <rect width="210" height="48" rx="24" fill="#ffffff" opacity="0.18"/>
    <text x="105" y="32"
          text-anchor="middle"
          font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
          font-weight="600"
          font-size="22"
          fill="#ffffff">pixdrip.app</text>
  </g>
</svg>
