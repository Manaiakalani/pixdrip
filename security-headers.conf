# Security headers — included from every location block in nginx.conf,
# because nginx does NOT inherit add_header into a child block that defines
# its own add_header directives.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content-Security-Policy.
#
# Self-hosted fonts let us drop external font CDNs entirely, so we can ship a
# strict CSP. Directive rationale:
#   default-src 'self'                 — deny by default, allow same-origin.
#   img-src 'self' data: blob: https:  — users paste image URLs from arbitrary
#                                        hosts; canvas exports use blob: and
#                                        data: URLs.
#   media-src 'self' blob:             — future-proofing for any <video>/<audio>
#                                        blob playback.
#   style-src 'self' 'unsafe-inline'   — index.html inlines an @font-face block
#                                        and a tiny onload style swap. Tighten
#                                        once those are extracted to a hashed
#                                        external stylesheet.
#   script-src 'self' 'unsafe-inline'  — index.html has a small inline SW
#                                        registration <script> with no nonce.
#                                        TODO: extract to /src/sw-register.js
#                                        (or add a build-time nonce/hash) and
#                                        drop 'unsafe-inline' here.
#   worker-src 'self' blob:            — service worker + any future Worker()
#                                        from a Blob URL.
#   manifest-src 'self'                — PWA manifest is same-origin.
#   font-src 'self'                    — fonts are now fully self-hosted.
#   connect-src 'self' data: blob:     — fetch()/XHR is same-origin only;
#                                        cross-origin URL imports go through
#                                        <img crossorigin> (img-src), not
#                                        connect-src, so this stays tight.
#   object-src 'none'                  — no <object>/<embed>/<applet>.
#   base-uri 'self'                    — block <base> tag injection.
#   frame-ancestors 'none'             — clickjacking defense, belt-and-
#                                        suspenders with X-Frame-Options.
#   form-action 'self'                 — forms can only submit same-origin.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; manifest-src 'self'; font-src 'self'; connect-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
