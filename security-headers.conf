# Security headers — included from every location block in nginx.conf,
# because nginx does NOT inherit add_header into a child block that defines
# its own add_header directives.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content-Security-Policy.
#
# Self-hosted fonts let us drop external font CDNs entirely, so we can ship a
# strict CSP. Directive rationale:
#   default-src 'self'                 — deny by default, allow same-origin.
#   img-src 'self' data: blob: https:  — users paste image URLs from arbitrary
#                                        hosts; canvas exports use blob: and
#                                        data: URLs.
#   media-src 'self' blob:             — future-proofing for any <video>/<audio>
#                                        blob playback.
#   style-src 'self' 'unsafe-inline'   — index.html inlines an @font-face block
#                                        and a tiny onload style swap. Tighten
#                                        once those are extracted to a hashed
#                                        external stylesheet.
#   script-src 'self' 'sha256-...'    — index.html has ONE inline <script> in
#                                        <head>: a 5-line theme bootstrap that
#                                        must run synchronously before paint to
#                                        avoid FOUC. We allow it via a SHA-256
#                                        hash so we can drop 'unsafe-inline'.
#                                        The audit test in tests/pixdrip.spec.js
#                                        ("only the documented theme-bootstrap
#                                        inline script is present") guards
#                                        against new inline scripts slipping in.
#                                        If the bootstrap is ever edited, the
#                                        hash here MUST be regenerated:
#                                          python3 -c "import re,hashlib,base64; \
#                                            h=open('index.html').read(); \
#                                            c=re.search(r'<script>(.*?)</script>',h,re.S).group(1); \
#                                            print(base64.b64encode(hashlib.sha256(c.encode()).digest()).decode())"
#   worker-src 'self' blob:            — service worker + any future Worker()
#                                        from a Blob URL.
#   manifest-src 'self'                — PWA manifest is same-origin.
#   font-src 'self'                    — fonts are now fully self-hosted.
#   connect-src 'self' data: blob:     — fetch()/XHR is same-origin only;
#                                        cross-origin URL imports go through
#                                        <img crossorigin> (img-src), not
#                                        connect-src, so this stays tight.
#   object-src 'none'                  — no <object>/<embed>/<applet>.
#   base-uri 'self'                    — block <base> tag injection.
#   frame-ancestors 'none'             — clickjacking defense, belt-and-
#                                        suspenders with X-Frame-Options.
#   form-action 'self'                 — forms can only submit same-origin.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-HkujkHbzzTiXGGnB51R9XErKf0i+m/1f7HkqU/yGtJ8='; worker-src 'self' blob:; manifest-src 'self'; font-src 'self'; connect-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
