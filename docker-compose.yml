services:
  pixdrip:
    build: .
    image: pixdrip:latest
    container_name: pixdrip
    ports:
      - "3010:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
