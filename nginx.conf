server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in Server header
    server_tokens off;

    # Security headers — included in every location that uses add_header,
    # because nginx does NOT inherit add_header directives into a child block
    # that defines its own.
    include /etc/nginx/snippets/security-headers.conf;

    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json font/woff2;
    gzip_min_length 256;

    # Hashed build assets — immutable, cache forever
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Self-hosted fonts — long-lived, immutable
    location /fonts/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Service worker — must always revalidate so updates ship
    location = /sw.js {
        include /etc/nginx/snippets/security-headers.conf;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Web manifest — short cache so updates propagate
    location = /manifest.json {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # App shell — no cache so SW + clients always get the latest entrypoint
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Health endpoint for container orchestration
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
